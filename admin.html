<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SHANGSHAIYA</title>
    <style>
        :root { --primary: #722f37; --green: #2e7d32; --bg: #fffcf5; }
        body { font-family: 'Georgia', serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 8px solid var(--primary); }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin: 0; }
        
        /* Image Gallery Styling */
        .image-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .img-card { position: relative; overflow: hidden; border-radius: 8px; height: 200px; border: 3px solid #eee; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .img-card:hover img { transform: scale(1.1); }
        .img-label { position: absolute; bottom: 0; background: rgba(0,0,0,0.6); color: white; width: 100%; padding: 5px; text-align: center; font-size: 0.8rem; }

        .btn-logout { background: #444; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; float: right; }
        .btn-logout:hover { background: #222; }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn-logout" onclick="logout()">Logout</button>
        <header>
            <h1>SHANGSHAIYA Admin</h1>
            <p>Global Heritage Enterprise | Management Portal</p>
        </header>

        <h3>Visual Theme: World Green & Hills</h3>
        <div class="image-row">
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=600" alt="Green Hills">
                <div class="img-label">Lush Green Hills</div>
            </div>
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=600" alt="World Nature">
                <div class="img-label">Global Green Heritage</div>
            </div>
        </div>

        <div style="background: #f0f7f0; border-left: 5px solid var(--green); padding: 15px; margin-top: 20px;">
            <strong>Admin Notice:</strong> You are viewing the protected management area.
        </div>
    </div>

    <script>
        // PROTECTION: Kick out users who aren't logged in
        (function() {
            if (localStorage.getItem("isLoggedIn") !== "true") {
                window.location.href = "login.html"; 
            }
        })();

        function logout() {
            localStorage.removeItem("isLoggedIn");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
