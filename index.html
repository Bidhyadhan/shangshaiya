<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANGSHAIYA | Luxury Heritage</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { 
            --primary: #5c262d; /* Deep Black-Cherry */
            --accent: #c5a059;  /* Muted Gold */
            --bg: #fdfaf5;      /* Parchment */
            --text: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        /* 1. MAGAZINE HEADER */
        header { padding: 40px 20px 10px; }
        header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.8rem; 
            margin: 0; 
            color: var(--primary);
            letter-spacing: -1px;
        }
        .subtitle { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); font-weight: 600; }

        /* 2. FLOATING NAV PILL */
        .nav-pill {
            position: sticky;
            top: 15px;
            margin: 0 15px 20px;
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #searchBar {
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }

        /* 3. BENTO GRID LAYOUT */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
        }

        .card {
            background: var(--glass);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .card:active { transform: scale(0.96); }

        .product-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 20px;
            padding: 5px;
        }

        .card-info { padding: 12px; flex-grow: 1; }
        .card-category { font-size: 0.6rem; text-transform: uppercase; color: var(--accent); font-weight: bold; }
        .card-title { font-size: 1rem; margin: 5px 0; font-weight: 600; line-height: 1.2; }
        .card-price { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin: 8px 0; }

        /* 4. LUXURY BUTTONS */
        .btn-buy {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .btn-buy:disabled { background: #ccc; }

        /* 5. MODALS & OVERLAYS */
        #story-modal, #scanner-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--bg); width: 100%; max-width: 380px; border-radius: 30px;
            overflow: hidden; animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #reader { width: 100%; border-radius: 20px; border: 4px solid var(--accent); }

        /* 6. CART FAB */
        #cart-fab {
            position: fixed; bottom: 20px; right: 20px; left: 20px;
            background: var(--text); color: white; padding: 18px;
            border-radius: 20px; text-align: center; font-weight: 600;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3); display: none;
        }
    </style>
</head>
<body>

<header>
    <div class="subtitle">Haflong Heritage</div>
    <h1>SHANGSHAIYA</h1>
</header>

<div class="nav-pill">
    <input type="text" id="searchBar" placeholder="Search our collection..." onkeyup="render()">
    <div onclick="startScanner()" style="color:var(--accent); font-size: 1.2rem; margin-left:10px;">📸</div>
</div>

<div class="product-grid" id="main-store"></div>

<div id="story-modal">
    <div class="modal-content">
        <img id="story-img" src="" style="width:100%; height:250px; object-fit:cover;">
        <div style="padding:25px;">
            <div id="story-artisan" class="card-category"></div>
            <h2 id="story-title" style="font-family:'Playfair Display'; margin:10px 0;"></h2>
            <p id="story-text" style="font-size:0.9rem; color:#555; line-height:1.6; font-style:italic;"></p>
            <button class="btn-buy" id="story-add-btn" style="padding:15px; font-size:1rem;">ADD TO ORDER</button>
            <button onclick="document.getElementById('story-modal').style.display='none'" style="width:100%; background:none; border:none; color:#888; margin-top:15px;">Close</button>
        </div>
    </div>
</div>

<div id="scanner-modal">
    <div style="width:100%; max-width:350px;">
        <div id="reader"></div>
        <button onclick="stopScanner()" class="btn-buy" style="margin-top:20px; background:#444;">CANCEL SCAN</button>
    </div>
</div>

<div id="cart-fab" onclick="sendWhatsAppOrder()">
    VIEW ORDER (<span id="cart-count">0</span>) & CHECKOUT
</div>

<script>
    const WHATSAPP = "9401941416";
    let cart = [];
    let html5QrCode;

    // Premium Database with Stories
    let database = JSON.parse(localStorage.getItem('shang_v5')) || [
        { id: "S1", name: "Hand-Woven Eri Silk", price: 4200, type: "Textile", stock: 5, artisan: "Liza Mech", story: "Soft as a cloud, woven over 12 days using traditional Dimasa patterns.", image: "https://images.unsplash.com/photo-1528813155440-17ef9765829d?w=600" },
        { id: "F1", name: "King Chilli Flakes", price: 350, type: "Food", stock: 15, artisan: "Hilltop Farmers", story: "Fire-dried over bamboo smoke for that authentic Haflong heat.", image: "https://images.unsplash.com/photo-1588252303782-cb80119abd6d?w=600" }
    ];

    function render() {
        const store = document.getElementById('main-store');
        const q = document.getElementById('searchBar').value.toLowerCase();
        
        const filtered = database.filter(i => i.name.toLowerCase().includes(q));

        store.innerHTML = filtered.map(item => `
            <div class="card">
                <img src="${item.image}" class="product-img" onclick="showStory('${item.id}')">
                <div class="card-info">
                    <div class="card-category">${item.type}</div>
                    <div class="card-title">${item.name}</div>
                    <div class="card-price">₹${item.price}</div>
                    <button class="btn-buy" ${item.stock <= 0 ? 'disabled' : ''} onclick="addToCart('${item.id}')">
                        ${item.stock <= 0 ? 'SOLD OUT' : 'ADD TO CART'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    function showStory(id) {
        const item = database.find(i => i.id === id);
        document.getElementById('story-img').src = item.image;
        document.getElementById('story-title').innerText = item.name;
        document.getElementById('story-artisan').innerText = "By " + item.artisan;
        document.getElementById('story-text').innerText = item.story;
        document.getElementById('story-add-btn').onclick = () => { addToCart(id); document.getElementById('story-modal').style.display='none'; };
        document.getElementById('story-modal').style.display = 'flex';
    }

    function addToCart(id) {
        const idx = database.findIndex(p => p.id === id);
        if(database[idx].stock > 0) {
            database[idx].stock--;
            cart.push(database[idx]);
            document.getElementById('cart-fab').style.display = 'block';
            document.getElementById('cart-count').innerText = cart.length;
            localStorage.setItem('shang_v5', JSON.stringify(database));
            render();
        }
    }

    function sendWhatsAppOrder() {
        const list = cart.map(i => `• ${i.name} (₹${i.price})`).join('%0A');
        const total = cart.reduce((s, i) => s + i.price, 0);
        window.open(`https://wa.me/${WHATSAPP}?text=*SHANGSHAIYA ORDER*%0A${list}%0A%0A*Total: ₹${total}*`, '_blank');
        cart = [];
        document.getElementById('cart-fab').style.display = 'none';
    }

    function startScanner() {
        document.getElementById('scanner-modal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            showStory(txt);
            stopScanner();
        });
    }

    function stopScanner() {
        if(html5QrCode) html5QrCode.stop();
        document.getElementById('scanner-modal').style.display = 'none';
    }

    render();
</script>
</body>
</html>
