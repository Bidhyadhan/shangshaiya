<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICJpbnRlbnRfc2NvcGUiOiAiLyIsCiAgIm5hbWUiOiAiU0hBTkdTSEFJWUEiLAogICJzaG9ydF9uYW1lIjogIlNoYW5nc2hhaXlhIiwKICAic3RhcnRfdXJsIjogImluZGV4Lmh0bWwiLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNlYWVkZWQiLAogICJ0aGVtZV9jb2xvciI6ICIjMjMyZjNlIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly92aWEucGxhY2Vob2xkZXIuY29tLzE5MiIsCiAgICAgICJzaXplcyI6ICIxOTJ4MTkyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --amazon-dark: #232f3e;
            --amazon-light: #37475a;
            --amazon-orange: #febd69;
            --amazon-bg: #eaeded;
        }

        /* Basic Reset & Mobile Optimization */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: var(--amazon-bg); 
            padding-bottom: 70px; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER */
        header { 
            background-color: var(--amazon-dark); 
            padding: 12px 15px; 
            color: white; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .logo { font-weight: bold; font-size: 1.4rem; color: white; text-decoration: none; letter-spacing: -1px; }
        .logo span { color: var(--amazon-orange); }

        /* SEARCH */
        .search-container { display: flex; width: 100%; height: 42px; }
        .search-input { flex: 1; border: none; padding: 0 12px; border-radius: 6px 0 0 6px; font-size: 1rem; outline: none; }
        .search-btn { background-color: var(--amazon-orange); border: none; width: 50px; border-radius: 0 6px 6px 0; cursor: pointer; font-size: 1.1rem; }

        /* SCANNER LINK */
        .scan-bar { background-color: var(--amazon-light); padding: 10px; text-align: center; }
        .scan-link { color: #00e7ff; text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }

        /* HERO BANNER */
        .banner { 
            width: 100%; 
            height: 160px; 
            background: linear-gradient(to bottom, transparent, var(--amazon-bg)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800'); 
            background-size: cover; 
            background-position: center; 
        }

        /* PRODUCT GRID */
        .product-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 12px; 
            margin-top: -40px; 
        }
        .product-card { 
            background: white; 
            padding: 12px; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            display: flex;
            flex-direction: column;
        }
        .product-card img { width: 100%; border-radius: 4px; height: 130px; object-image-fit: cover; }
        .product-title { font-size: 0.85rem; margin: 8px 0; height: 34px; overflow: hidden; line-height: 1.2; color: #333; }
        .price { font-size: 1.1rem; font-weight: bold; color: #B12704; }
        .buy-btn { 
            background: #ffd814; 
            border: 1px solid #fcd200; 
            border-radius: 8px; 
            width: 100%; 
            padding: 10px; 
            margin-top: auto; 
            cursor: pointer; 
            font-weight: 500;
            font-size: 0.8rem;
        }

        /* BOTTOM MOBILE NAVIGATION */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: white; 
            display: flex; 
            justify-content: space-around; 
            padding: 8px 0; 
            border-top: 1px solid #eee; 
            z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom); /* For iPhone Notch */
        }
        .nav-item { color: var(--amazon-dark); text-decoration: none; text-align: center; font-size: 0.65rem; flex: 1; }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 2px; }
        .nav-item.active { color: #e67e22; }
    </style>
</head>
<body>

    <header>
        <div class="nav-top">
            <a href="#" class="logo">shang<span>shaiya</span></a>
            <div style="font-size: 0.85rem;"><i class="fa fa-user"></i> Sign in</div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
            <button class="search-btn"><i class="fa fa-search"></i></button>
        </div>
    </header>

    <div class="scan-bar">
        <a href="#" class="scan-link"><i class="fa fa-camera"></i> AGENT ACCESS: SCAN QR</a>
    </div>

    <div class="banner"></div>

    <div class="product-grid" id="productGrid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1610116303218-1f310de40764?w=400" alt="Silk">
            <div class="product-title">Premium Indigenous Eri Silk - Hand Dyed</div>
            <div class="price">₹3,500</div>
            <button class="buy-btn" onclick="addToCart('Eri Silk', 3500)">Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1588252303782-cb80119abd6d?w=400" alt="Chilli">
            <div class="product-title">Haflong King Chilli (Bhut Jolokia)</div>
            <div class="price">₹249</div>
            <button class="buy-btn" onclick="addToCart('King Chilli', 249)">Add to Cart</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fa fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fa fa-user"></i>Account</a>
        <a href="#" class="nav-item" onclick="viewCart()"><i class="fa fa-shopping-cart"></i>Cart <span id="cartCount">(0)</span></a>
        <a href="#" class="nav-item"><i class="fa fa-bars"></i>Menu</a>
    </nav>

    <script>
        // --- 1. CART LOGIC ---
        let cart = JSON.parse(localStorage.getItem("shangCart") || "[]");

        function updateUI() {
            document.getElementById('cartCount').innerText = `(${cart.length})`;
        }

        function addToCart(name, price) {
            cart.push({ name, price, date: new Date() });
            localStorage.setItem("shangCart", JSON.stringify(cart));
            updateUI();
            alert("✅ " + name + " added to basket!");
        }

        function viewCart() {
            if(cart.length === 0) {
                alert("Your cart is empty!");
            } else {
                let list = cart.map(i => `${i.name} - ₹${i.price}`).join('\n');
                alert("Your Items:\n" + list);
            }
        }

        // --- 2. ADMIN PRODUCT LOADING ---
        function loadAdminProducts() {
            const adminProducts = JSON.parse(localStorage.getItem("myProducts") || "[]");
            const grid = document.getElementById("productGrid");
            
            adminProducts.forEach(p => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=400" alt="New Item">
                    <div class="product-title">${p.name}</div>
                    <div class="price">₹${p.price}</div>
                    <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
                `;
                grid.appendChild(card);
            });
        }

        // --- 3. INITIALIZE ---
        window.onload = () => {
            loadAdminProducts();
            updateUI();
        };

        // --- 4. SERVICE WORKER REGISTRATION (The "App" part) ---
        if ('serviceWorker' in navigator) {
            const swCode = `
                const cacheName = 'shang-v1';
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(cacheName).then(cache => cache.addAll(['index.html'])));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
</html>
