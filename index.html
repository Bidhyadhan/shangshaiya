<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANGSHAIYA | Heritage Enterprise</title>
    
    <meta name="theme-color" content="#232f3e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/json;base64,ewogICJpbnRlbnRfc2NvcGUiOiAiLyIsCiAgIm5hbWUiOiAiU0hBTkdTSEFJWUEiLAogICJzaG9ydF9uYW1lIjogIlNoYW5nc2hhaXlhIiwKICAic3RhcnRfdXJsIjogImluZGV4Lmh0bWwiLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNlYWVkZWQiLAogICJ0aGVtZV9jb2xvciI6ICIjMjMyZjNlIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly92aWEucGxhY2Vob2xkZXIuY29tLzE5MiIsCiAgICAgICJzaXplcyI6ICIxOTJ4MTkyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { 
            --amazon-dark: #232f3e; 
            --amazon-orange: #febd69;
            --primary-silk: #722f37; 
            --accent-gold: #daa520; 
            --bg: #eaeded; 
            --ai-purple: #8e44ad;
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }

        /* 1. TOP NAV & LANGUAGE */
        .top-bar { background: #1a1a1a; color: white; padding: 8px 15px; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .lang-btn { cursor: pointer; padding: 2px 6px; border: 1px solid #444; border-radius: 3px; margin-left: 5px; }
        
        header { background: var(--amazon-dark); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; text-decoration: none; color: white; }
        .logo span { color: var(--amazon-orange); }

        /* 2. SEARCH & SCAN */
        .search-box { display: flex; margin-top: 10px; }
        .search-box input { flex: 1; border: none; padding: 10px; border-radius: 4px 0 0 4px; }
        .search-btn { background: var(--amazon-orange); border: none; width: 45px; border-radius: 0 4px 4px 0; }
        .scan-trigger { background: #37475a; color: #00e7ff; text-align: center; padding: 8px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }

        /* 3. PRODUCT GRID */
        .container { padding: 15px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative;}
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; }
        .badge { position: absolute; top: 5px; left: 5px; background: var(--primary-silk); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; }
        .price { color: #B12704; font-size: 1.1rem; font-weight: bold; margin: 5px 0; }
        .buy-btn { background: #ffd814; border: 1px solid #fcd200; padding: 8px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }

        /* 4. ADMIN & AI PANELS */
        #admin-panel { display: none; background: white; margin: 15px; padding: 20px; border-radius: 10px; border-top: 5px solid var(--primary-silk); }
        .ai-box { background: #fdf2ff; border: 1px solid var(--ai-purple); padding: 10px; border-radius: 8px; margin-top: 10px; }
        
        /* 5. BOTTOM NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding: 10px 0; z-index: 2000; }
        .nav-item { flex: 1; text-align: center; color: var(--amazon-dark); text-decoration: none; font-size: 0.7rem; }
        .nav-item i { font-size: 1.3rem; display: block; }

        /* QR SCANNER UI */
        #reader { width: 100%; margin-top: 10px; display: none; }
        .secure-dot { position: fixed; bottom: 5px; right: 5px; width: 12px; height: 12px; opacity: 0.1; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <div>HAFLONG | 2026</div>
    <div>
        <span class="lang-btn">Dimasa</span>
        <span class="lang-btn">English</span>
    </div>
</div>

<header>
    <a href="#" class="logo">shang<span>shaiya</span></a>
    <div class="search-box">
        <input type="text" placeholder="Search Indigenous Silk...">
        <button class="search-btn"><i class="fa fa-search"></i></button>
    </div>
</header>

<div class="scan-trigger" onclick="startScanner()">
    <i class="fa fa-camera"></i> AGENT ACCESS: SCAN PRODUCT QR
</div>

<div class="container">
    <div id="reader"></div>
    <div class="product-grid" id="main-store">
        </div>

    <div id="admin-panel">
        <h3>Master Control Center</h3>
        <div class="ai-box">
            <h4 style="color:var(--ai-purple); margin:0;">🤖 Gemini Business Strategist</h4>
            <input type="text" id="ai-query" placeholder="Ask Gemini about export..." style="width:80%; padding:5px; margin-top:10px;">
            <button onclick="consultAI()" style="background:var(--ai-purple); color:white; border:none; padding:5px 10px; border-radius:4px;">Consult</button>
            <p id="ai-resp" style="font-size: 0.8rem; font-style: italic;"></p>
        </div>
        <hr>
        <h4>Add New Inventory</h4>
        <input type="text" id="p-name" placeholder="Item Name" style="width:100%; margin-bottom:5px;"><br>
        <input type="number" id="p-price" placeholder="Price (₹)" style="width:100%; margin-bottom:5px;"><br>
        <button onclick="addNewProduct()" class="buy-btn" style="width:100%">Add to Global Store</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item" onclick="showHome()"><i class="fa fa-home"></i>Home</a>
    <a href="#" class="nav-item"><i class="fa fa-heart"></i>Wishlist</a>
    <a href="#" class="nav-item" onclick="alert('Cart is empty')"><i class="fa fa-shopping-cart"></i>Cart</a>
    <a href="#" class="nav-item" onclick="login()"><i class="fa fa-lock"></i>Admin</a>
</nav>

<div class="secure-dot" onclick="login()"></div>

<script>
    const CONTACT = "9401941416";
    const ADMIN_KEY = "123456";

    // --- 1. DATA ---
    let products = JSON.parse(localStorage.getItem('shangProducts')) || [
        {id: "ERI01", name: "Premium Eri Silk", price: 3500, img: "https://images.unsplash.com/photo-1610116303218-1f310de40764?w=400", type: "Heritage"},
        {id: "CHILLI02", name: "King Chilli (Dry)", price: 250, img: "https://images.unsplash.com/photo-1588252303782-cb80119abd6d?w=400", type: "Organic"}
    ];

    // --- 2. RENDER ENGINE ---
    function renderStore() {
        const store = document.getElementById('main-store');
        store.innerHTML = products.map(p => `
            <div class="card">
                <span class="badge">${p.type}</span>
                <img src="${p.img}" alt="product">
                <div style="font-size:0.8rem; margin-top:5px; height:32px; overflow:hidden;">${p.name}</div>
                <div class="price">₹${p.price}</div>
                <button class="buy-btn" onclick="order('${p.name}')">Order via WA</button>
            </div>
        `).join('');
    }

    function order(name) {
        window.open(`https://wa.me/${CONTACT}?text=I+want+to+buy+${name}`, '_blank');
    }

    // --- 3. SCANNER LOGIC ---
    function startScanner() {
        const reader = document.getElementById('reader');
        reader.style.display = 'block';
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            alert("QR Scanned: " + text);
            scanner.stop();
            reader.style.display = 'none';
        });
    }

    // --- 4. ADMIN & AI LOGIC ---
    function login() {
        let pass = prompt("Enter Master Key:");
        if(pass === ADMIN_KEY) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('main-store').style.display = 'none';
        }
    }

    function showHome() {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('main-store').style.display = 'grid';
    }

    function addNewProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        if(!name || !price) return alert("Fill all fields");

        products.push({
            id: "NEW" + Date.now(),
            name: name,
            price: price,
            img: "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=400",
            type: "New Arrival"
        });
        localStorage.setItem('shangProducts', JSON.stringify(products));
        renderStore();
        showHome();
    }

    function consultAI() {
        const q = document.getElementById('ai-query').value;
        document.getElementById('ai-resp').innerText = "Gemini suggests: To export " + q + ", ensure moisture is below 10% for global shipping compliance.";
    }

    // --- 5. INITIALIZE ---
    window.onload = renderStore;

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(URL.createObjectURL(new Blob([`
            self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
        `], {type: 'text/javascript'})));
    }
</script>
</body>
</html>
