<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANGSHAIYA | Heritage Enterprise</title>
    
    <meta name="theme-color" content="#232f3e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/json;base64,ewogICJpbnRlbnRfc2NvcGUiOiAiLyIsCiAgIm5hbWUiOiAiU0hBTkdTSEFJWUEiLAogICJzaG9ydF9uYW1lIjogIlNoYW5nc2hhaXlhIiwKICAic3RhcnRfdXJsIjogImluZGV4Lmh0bWwiLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNlYWVkZWQiLAogICJ0aGVtZV9jb2xvciI6ICIjMjMyZjNlIgp9">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { 
            --amazon-dark: #232f3e; --amazon-orange: #febd69; --amazon-light: #37475a;
            --primary-silk: #722f37; --accent-gold: #daa520; --bg: #eaeded; 
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }

        /* HEADER & SEARCH */
        header { background: var(--amazon-dark); color: white; padding: 12px; position: sticky; top: 0; z-index: 1000; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .logo { font-size: 1.4rem; font-weight: bold; text-decoration: none; color: white; }
        .logo span { color: var(--amazon-orange); }
        
        .search-box { display: flex; height: 40px; }
        .search-box input { flex: 1; border: none; padding: 0 12px; border-radius: 4px 0 0 4px; font-size: 1rem; outline: none; }
        .search-btn { background: var(--amazon-orange); border: none; width: 45px; border-radius: 0 4px 4px 0; cursor: pointer; }

        /* CATEGORY TABS */
        .category-bar { background: white; padding: 8px; display: flex; overflow-x: auto; gap: 8px; border-bottom: 1px solid #ddd; white-space: nowrap; }
        .cat-btn { padding: 6px 15px; border: 1px solid #ddd; border-radius: 20px; background: #f3f3f3; font-size: 0.8rem; cursor: pointer; }
        .cat-btn.active { background: var(--amazon-orange); border-color: var(--amazon-orange); font-weight: bold; }

        /* SCANNER TRIGGER */
        .scan-bar { background: var(--amazon-light); color: #00e7ff; text-align: center; padding: 10px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }

        /* PRODUCT GRID */
        .container { padding: 10px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 130px; object-fit: cover; border-radius: 4px; }
        .badge { position: absolute; top: 15px; left: 15px; background: var(--primary-silk); color: white; font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; }
        .price { color: #B12704; font-size: 1.1rem; font-weight: bold; margin: 5px 0; }
        .buy-btn { background: #ffd814; border: 1px solid #fcd200; padding: 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: bold; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: #c0392b; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; z-index: 10; }

        /* ADMIN PANEL */
        #admin-panel { display: none; background: white; padding: 20px; margin: 10px; border-radius: 10px; border-top: 4px solid var(--primary-silk); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.75rem; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding: 10px 0; z-index: 2000; }
        .nav-item { flex: 1; text-align: center; color: var(--amazon-dark); text-decoration: none; font-size: 0.7rem; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 2px; }

        #reader { width: 100%; display: none; margin-bottom: 15px; }
        .secure-dot { position: fixed; bottom: 5px; right: 5px; width: 15px; height: 15px; opacity: 0.05; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <a href="#" class="logo" onclick="location.reload()">shang<span>shaiya</span></a>
        <div style="font-size: 0.8rem;"><i class="fa fa-globe"></i> HAFLONG</div>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" oninput="filterAll()" placeholder="Search Silk, Chilli, Crafts...">
        <button class="search-btn"><i class="fa fa-search"></i></button>
    </div>
</header>

<div class="category-bar">
    <button class="cat-btn active" onclick="setCategory('All', this)">All</button>
    <button class="cat-btn" onclick="setCategory('Heritage', this)">Heritage Silk</button>
    <button class="cat-btn" onclick="setCategory('Organic', this)">Organic Food</button>
    <button class="cat-btn" onclick="setCategory('Craft', this)">Handicrafts</button>
</div>

<div class="scan-bar" onclick="startScanner()">
    <i class="fa fa-camera"></i> AGENT SCANNER
</div>

<div class="container">
    <div id="reader"></div>
    <div id="scan-actions"></div>
    
    <div class="product-grid" id="main-store"></div>

    <div id="admin-panel">
        <h3 style="margin-top:0;">Master Control</h3>
        <div class="form-group">
            <label>Item Name</label>
            <input type="text" id="p-name" placeholder="e.g. Eri Silk Shawl">
        </div>
        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" id="p-price" placeholder="2500">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="p-type">
                <option value="Heritage">Heritage Silk</option>
                <option value="Organic">Organic Food</option>
                <option value="Craft">Handicraft</option>
            </select>
        </div>
        <div class="form-group">
            <label>Photo</label>
            <input type="file" id="p-image-file" accept="image/*">
        </div>
        <button onclick="addNewProduct()" class="buy-btn" style="width:100%; background:var(--amazon-dark); color:white;">Add to Store</button>
        <button onclick="resetApp()" style="margin-top:20px; width:100%; border:none; background:none; color:#ccc; font-size:0.6rem;">Wipe All Data</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item" onclick="showSection('home')"><i class="fa fa-home"></i>Home</a>
    <a href="#" class="nav-item"><i class="fa fa-heart"></i>Wishlist</a>
    <a href="#" class="nav-item" onclick="alert('Cart is empty')"><i class="fa fa-shopping-cart"></i>Cart</a>
    <a href="#" class="nav-item" onclick="login()"><i class="fa fa-user-shield"></i>Admin</a>
</nav>

<div class="secure-dot" onclick="login()"></div>

<script>
    const CONTACT = "9401941416";
    const ADMIN_KEY = "123456";
    
    let products = JSON.parse(localStorage.getItem('shangProducts')) || [
        {id: "ERI01", name: "Premium Eri Silk", price: 3500, type: "Heritage", img: "https://images.unsplash.com/photo-1610116303218-1f310de40764?w=400"},
        {id: "KING02", name: "Haflong King Chilli", price: 250, type: "Organic", img: "https://images.unsplash.com/photo-1588252303782-cb80119abd6d?w=400"}
    ];

    let currentCategory = "All";
    let scannerInstance = null;

    // --- RENDER ---
    function render() {
        const store = document.getElementById('main-store');
        const isAdmin = document.getElementById('admin-panel').style.display === 'block';
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();

        const filtered = products.filter(p => {
            const matchesSearch = p.name.toLowerCase().includes(searchTerm);
            const matchesCat = currentCategory === "All" || p.type === currentCategory;
            return matchesSearch && matchesCat;
        });

        store.innerHTML = filtered.map((p, idx) => `
            <div class="card">
                <span class="badge">${p.type}</span>
                ${isAdmin ? `<button class="del-btn" onclick="deleteItem(${idx})">×</button>` : ''}
                <img src="${p.img}">
                <div style="font-size:0.85rem; margin-top:8px; height:34px; overflow:hidden; font-weight:500;">${p.name}</div>
                <div class="price">₹${p.price}</div>
                <button class="buy-btn" onclick="order('${p.name}')">Buy Now</button>
            </div>
        `).join('');
    }

    // --- FILTERS ---
    function setCategory(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function filterAll() { render(); }

    // --- ADMIN ACTIONS ---
    function login() {
        if(prompt("Enter Admin Key:") === ADMIN_KEY) {
            showSection('admin');
        }
    }

    function showSection(sec) {
        const admin = document.getElementById('admin-panel');
        const grid = document.getElementById('main-store');
        if(sec === 'admin') {
            admin.style.display = 'block';
            grid.style.display = 'none';
        } else {
            admin.style.display = 'none';
            grid.style.display = 'grid';
        }
        render();
    }

    function addNewProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const type = document.getElementById('p-type').value;
        const file = document.getElementById('p-image-file').files[0];

        if(!name || !price) return alert("Enter name and price");

        const reader = new FileReader();
        reader.onload = (e) => {
            products.push({ id: Date.now(), name, price, type, img: e.target.result });
            localStorage.setItem('shangProducts', JSON.stringify(products));
            alert("Added!");
            showSection('home');
        };
        
        if(file) reader.readAsDataURL(file);
        else {
            products.push({ id: Date.now(), name, price, type, img: "https://via.placeholder.com/150" });
            localStorage.setItem('shangProducts', JSON.stringify(products));
            showSection('home');
        }
    }

    function deleteItem(idx) {
        if(confirm("Delete this product?")) {
            products.splice(idx, 1);
            localStorage.setItem('shangProducts', JSON.stringify(products));
            render();
        }
    }

    function resetApp() { if(confirm("Clear all items?")) { localStorage.clear(); location.reload(); } }

    // --- SCANNER ---
    function startScanner() {
        const readerDiv = document.getElementById('reader');
        readerDiv.style.display = 'block';
        
        if(!document.getElementById('stop-btn')) {
            const btn = document.createElement('button');
            btn.id = 'stop-btn';
            btn.innerHTML = "Stop Camera";
            btn.className = "buy-btn";
            btn.style = "width:100%; margin-bottom:10px; background:#c0392b; color:white;";
            btn.onclick = stopScanner;
            readerDiv.parentNode.insertBefore(btn, readerDiv);
        }

        scannerInstance = new Html5Qrcode("reader");
        scannerInstance.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            alert("Scanned Code: " + text);
            stopScanner();
        }).catch(err => alert("Camera Error: " + err));
    }

    function stopScanner() {
        if(scannerInstance) {
            scannerInstance.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('stop-btn').remove();
            });
        }
    }

    function order(name) {
        window.open(`https://wa.me/${CONTACT}?text=Order+Requested:+${name}`, '_blank');
    }

    window.onload = render;
</script>
</body>
</html>
